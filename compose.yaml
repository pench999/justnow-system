services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${JUSTNOW_HTTP_PORT:-9292}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx:/etc/nginx/auth:ro

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RACK_ENV: production
      YABITZ_DOCKER_CONFIG: "1"
      YABITZ_DB_HOST: db
      YABITZ_DB_PORT: "3306"
      YABITZ_TRUSTED_PROXY_AUTH: "true"
      YABITZ_TRUSTED_PROXY_AUTH_HEADER: X-Remote-User
      YABITZ_TRUSTED_PROXY_AUTH_FULLNAME_HEADER: X-Remote-Name
      YABITZ_HTPASSWD_PATH: /app/config/nginx_auth/.htpasswd
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9292"
    volumes:
      - ./log:/app/log
      - ./tmp:/app/tmp
      - ./docker/nginx:/app/config/nginx_auth

  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${YABITZ_DB_NAME}
      MYSQL_USER: ${YABITZ_DB_USER}
      MYSQL_PASSWORD: ${YABITZ_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
